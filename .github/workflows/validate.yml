name: Validate skills

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make validator executable
        run: chmod +x scripts/validate-skills.sh

      - name: Validate skills
        run: ./scripts/validate-skills.sh

      - name: Verify CLI discovery
        run: npx --yes skills add . --list